services:
  redis:
    image: redis:7-alpine

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./website:/app/website

  celery-worker:
    build: .
    command: celery -A website worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - web
    volumes:
      - ./website:/app/website

  celery-beat:
    build: .
    command: celery -A website beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    depends_on:
      - redis
      - web
    volumes:
      - ./website:/app/website
