<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} | Daily Routine Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0f4ff', 100: '#dbe4ff', 200: '#bac8ff', 400: '#748ffc', 500: '#5c7cfa', 600: '#4c6ef5', 700: '#4263eb', 800: '#3b5bdb', 900: '#364fc7' }
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 sm:px-6">
            <div class="flex items-center justify-between h-14">
                <!-- Brand -->
                <a href="{% url 'todo' %}" class="text-lg font-bold text-brand-700 tracking-tight">
                    Daily Routine Tracker
                </a>

                <!-- Nav Links -->
                <div class="flex items-center gap-1">
                    <a href="{% url 'todo' %}" class="px-3 py-1.5 text-sm font-medium text-gray-600 hover:text-brand-700 hover:bg-brand-50 rounded-lg transition">Tasks</a>
                    <a href="{% url 'calendar' %}" class="px-3 py-1.5 text-sm font-medium text-gray-600 hover:text-brand-700 hover:bg-brand-50 rounded-lg transition">Calendar</a>
                    <a href="{% url 'week_custom' %}" class="px-3 py-1.5 text-sm font-medium text-gray-600 hover:text-brand-700 hover:bg-brand-50 rounded-lg transition">Routines</a>
                    <a href="{% url 'settings' %}" class="px-3 py-1.5 text-sm font-medium text-gray-600 hover:text-brand-700 hover:bg-brand-50 rounded-lg transition">Settings</a>

                    <div class="w-px h-5 bg-gray-200 mx-1"></div>

                    {% if user.is_authenticated %}
                        <span class="text-xs text-gray-400 hidden sm:inline">{{ user.first_name|default:user.username }}</span>
                        <a href="{% url 'logout' %}" class="px-3 py-1.5 text-sm font-medium text-red-500 hover:text-red-700 hover:bg-red-50 rounded-lg transition">Logout</a>
                    {% else %}
                        <a href="{% url 'login' %}" class="px-3 py-1.5 text-sm font-medium text-brand-700 hover:bg-brand-50 rounded-lg transition">Login</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="flex-1 max-w-5xl w-full mx-auto px-4 sm:px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="text-center text-xs text-gray-400 py-4 border-t border-gray-100">
        Daily Routine Tracker
    </footer>

</body>
</html>
